  <h1>在Santa Monica 休闲的一天</h1>
  <div class="meta">2026-05-04  &middot;  共 11 张</div>
  <div class="narrative">2026年5月4日，本以为会是个阳光明媚的加州日，没想到Santa Monica却被一片阴云笼罩。即便如此，海滩上依然人潮涌动，远山与近海之间，工地的轰鸣和</div>
  <div class="gallery">
    <figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-01.jpg" alt="云下海滩" loading="lazy"><figcaption class="caption"><span class="t">云下海滩</span>阴云下海滩人潮涌动，远山近海，工地与休闲并存。</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-02.jpg" alt="沙滩飞球" loading="lazy"><figcaption class="caption"><span class="t">沙滩飞球</span>海滩上，人们嬉戏，狗狗追逐飞球，远山连绵，云卷云舒，尽显假日</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-03.jpg" alt="云海沙滩" loading="lazy"><figcaption class="caption"><span class="t">云海沙滩</span>阴云笼罩的宽阔沙滩，海面平静，远方一线微光。</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-04.jpg" alt="海边暮色" loading="lazy"><figcaption class="caption"><span class="t">海边暮色</span>傍晚海滩，云层低垂，海天一线泛着微光，宁静而广阔。</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-05.jpg" alt="暮光海岸" loading="lazy"><figcaption class="caption"><span class="t">暮光海岸</span>云层低垂，海面微光，沙滩绵延至远山，一派宁静的海岸风光。</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-06.jpg" alt="滨海静思" loading="lazy"><figcaption class="caption"><span class="t">滨海静思</span>一人静坐高台，远眺阴天海滩与棕榈，氛围宁静而沉思。</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-07.jpg" alt="云海之约" loading="lazy"><figcaption class="caption"><span class="t">云海之约</span>三人海边自拍，远眺沙滩海浪，云天一色，旅途温馨。</figcaption></figure><figure class="photo"><img src="images/2026-05-04-%E5%9C%A8Santa-Monica-%E4%BC%91%E9%97%B2%E7%9A%84%E4%B8%80%E5%A4%A9-08.jpg" alt="椰风云影" loading="lazy"><figcaption class="caption"><span class="t">椰风云影</span>湛蓝天空浮云朵朵， <script>
(function(){
  var box = document.querySelector('.lightbox');
  var img = box.querySelector('img');
  document.querySelectorAll('.photo img').forEach(function(el){
    el.addEventListener('click', function(){
      img.src = el.src;
      box.classList.add('show');
    });
  });
  box.addEventListener('click', function(){ box.classList.remove('show'); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') box.classList.remove('show');
  });
})();
</script>
